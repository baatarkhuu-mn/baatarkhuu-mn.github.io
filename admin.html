<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#060b16" />
  <meta name="robots" content="noindex, nofollow" />
  <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");</script>
  <title>Админ — Санал хүсэлт | Ц.Баатархүү</title>
  <link rel="icon" type="image/svg+xml" href="assets/img/logo.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .admin-top { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
      padding:16px 0; border-bottom:1px solid var(--color-border); margin-bottom:24px; }
    .admin-top .brand { gap:10px; }
    .login-wrap { min-height:80vh; display:grid; place-items:center; }
    .login-card { width:100%; max-width:400px; }
    .stat-row { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
    .mini-stat { background:var(--color-bg-card); border:1px solid var(--color-border); border-radius:var(--radius);
      padding:18px; text-align:center; }
    .mini-stat .n { font-size:1.8rem; font-weight:800; color:var(--color-primary-light); line-height:1; }
    .mini-stat .l { font-size:.8rem; color:var(--color-text-soft); margin-top:6px; }
    .toolbar { display:flex; flex-direction:column; gap:12px; margin-bottom:24px; }
    .toolbar-main { display:flex; gap:10px; align-items:center; }
    .toolbar-main .field { flex:1; margin:0; }
    .toolbar-main .btn { white-space:nowrap; }
    .toolbar-filters { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .toolbar input, .toolbar select {
      width:100%; padding:11px 14px; border-radius:var(--radius-sm);
      border:1px solid var(--color-border); background:var(--color-bg-card);
      color:var(--color-text); font-family:inherit; font-size:.9rem; }
    .toolbar input:focus, .toolbar select:focus { outline:none; border-color:var(--color-primary-light); }
    @media (max-width:700px){
      .toolbar-main { flex-wrap:wrap; }
      .toolbar-main .field { flex:1 1 100%; }
      .toolbar-filters { grid-template-columns:1fr; }
    }
    .fb-card { background:var(--color-bg-card); border:1px solid var(--color-border); border-radius:var(--radius);
      padding:20px; margin-bottom:16px; }
    .fb-head { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:flex-start; margin-bottom:10px; }
    .fb-name { font-weight:700; font-size:1.05rem; }
    .fb-meta { font-size:.82rem; color:var(--color-text-soft); display:flex; gap:12px; flex-wrap:wrap; margin-top:4px; }
    .fb-badges { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .fb-msg { color:var(--color-text); margin:12px 0; white-space:pre-wrap; line-height:1.6; }
    .fb-photos { display:flex; gap:8px; flex-wrap:wrap; margin:12px 0; }
    .fb-photos img { width:90px; height:90px; object-fit:cover; border-radius:var(--radius-sm); border:1px solid var(--color-border); cursor:pointer; }
    .fb-foot { display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; margin-top:12px;
      padding-top:12px; border-top:1px solid var(--color-border); }
    .fb-contact a { color:var(--color-primary-light); font-size:.88rem; margin-right:14px; }
    .rate-pill { background:var(--color-accent-soft); color:var(--color-accent); font-weight:700; padding:4px 12px;
      border-radius:30px; font-size:.82rem; border:1px solid rgba(224,182,83,.4); }
    .status-sel { padding:7px 12px; border-radius:var(--radius-sm); border:1px solid var(--color-border);
      background:var(--color-bg); color:var(--color-text); font-family:inherit; font-size:.85rem; cursor:pointer; }
    .lightbox { position:fixed; inset:0; z-index:2000; background:rgba(2,8,18,.92); display:none; place-items:center; padding:24px; }
    .lightbox.open { display:grid; }
    .lightbox img { max-width:92vw; max-height:88vh; border-radius:var(--radius); }
    .lightbox button { position:absolute; top:20px; right:24px; background:var(--color-bg-card); color:var(--color-text);
      border:1px solid var(--color-border); border-radius:50%; width:44px; height:44px; cursor:pointer; font-size:1.1rem; }
    @media (max-width:640px){ .stat-row{ grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="admin-top">
      <span class="brand"><span class="emblem" style="width:42px;height:42px;display:block"><img src="assets/img/logo.svg" alt="" /></span>
        <span class="brand-text"><strong>Админ самбар</strong><span style="display:block;font-size:.72rem;color:var(--color-accent)">Санал хүсэлт</span></span></span>
      <div style="display:flex;gap:10px;align-items:center">
        <a href="index.html" class="btn btn-ghost btn-sm">← Сайт руу</a>
        <button id="logout-btn" class="btn btn-outline btn-sm" style="display:none">Гарах</button>
      </div>
    </div>

    <!-- НЭВТРЭХ -->
    <div id="login-view" class="login-wrap" style="display:none">
      <div class="form-card login-card">
        <h2 style="margin-bottom:6px">Нэвтрэх</h2>
        <p class="form-note" style="margin-bottom:20px">Зөвхөн эрх бүхий хүн нэвтэрнэ.</p>
        <form id="login-form">
          <div class="form-group"><label for="l-email">И-мэйл</label>
            <input type="email" id="l-email" required autocomplete="username" /></div>
          <div class="form-group"><label for="l-pass">Нууц үг</label>
            <input type="password" id="l-pass" required autocomplete="current-password" /></div>
          <button type="submit" class="btn btn-gold" style="width:100%">Нэвтрэх</button>
          <div id="login-err" class="form-note" style="color:var(--color-danger);margin-top:10px"></div>
        </form>
      </div>
    </div>

    <!-- САМБАР -->
    <div id="dash-view" style="display:none">
      <div class="admin-tabs">
        <button type="button" class="atab active" data-view="fb">Санал хүсэлт</button>
        <button type="button" class="atab" data-view="news">Мэдээ</button>
      </div>

      <div id="fb-view">
      <div class="stat-row">
        <div class="mini-stat"><div class="n" id="st-total">—</div><div class="l">Нийт санал</div></div>
        <div class="mini-stat"><div class="n" id="st-new">—</div><div class="l">Шинэ (хариугүй)</div></div>
        <div class="mini-stat"><div class="n" id="st-rating">—</div><div class="l">Дундаж үнэлгээ</div></div>
        <div class="mini-stat"><div class="n" id="st-photos">—</div><div class="l">Зурагтай санал</div></div>
      </div>

      <div class="toolbar">
        <div class="toolbar-main">
          <div class="field"><input type="text" id="f-q" placeholder="Нэр, агуулгаар хайх…" /></div>
          <button id="refresh-btn" class="btn btn-ghost btn-sm">Сэргээх</button>
          <button id="export-btn" class="btn btn-gold btn-sm">Excel татах</button>
        </div>
        <div class="toolbar-filters">
          <select id="f-district"><option value="all">Бүх дүүрэг</option><option>Чингэлтэй</option><option>Сүхбаатар</option><option>Бусад</option></select>
          <select id="f-status"><option value="all">Бүх төлөв</option><option value="new">Шинэ</option><option value="in_progress">Шийдвэрлэж буй</option><option value="done">Шийдвэрлэсэн</option></select>
          <select id="f-subject">
            <option value="all">Бүх төрөл</option>
            <option value="gerel">Гэрэлтүүлэг</option>
            <option value="zam">Зам, нүх, эвдрэл</option>
            <option value="yavgan">Явган хүний зам</option>
            <option value="hog">Хог, орчны бохирдол</option>
            <option value="buudal">Автобусны буудал</option>
            <option value="surguuli">Сургууль, цэцэрлэг</option>
            <option value="emnelg">Эмнэлэг, өрхийн эмнэлэг</option>
            <option value="soh">СӨХ, байрны орчин</option>
            <option value="hurteemj">Ахмад, ХБИ хүртээмж</option>
            <option value="huuli">Хууль, бодлогын санал</option>
            <option value="urgudul">Хувийн өргөдөл, тусламж</option>
            <optgroup label="Хуучин ангилал">
              <option value="sanal">Санал</option>
              <option value="gomdol">Гомдол</option>
              <option value="asuudal">Тулгамдсан асуудал</option>
              <option value="uulzalt">Уулзалтын хүсэлт</option>
              <option value="busad">Бусад</option>
            </optgroup>
          </select>
        </div>
      </div>

      <div id="fb-list"></div>
      <div id="fb-empty" class="search-empty" style="display:none">Илэрц алга.</div>
      <div id="fb-loading" class="search-empty">Ачааллаж байна…</div>
      </div><!-- /fb-view -->

      <!-- ============ МЭДЭЭ УДИРДАХ ============ -->
      <div id="news-view" style="display:none">
        <div class="form-card" style="margin-bottom:26px">
          <h3 id="news-form-title" style="margin-bottom:16px">Шинэ мэдээ нэмэх</h3>
          <form id="news-form">
            <input type="hidden" id="n-id" />
            <div class="form-group"><label for="n-title">Гарчиг <span style="color:var(--color-danger)">*</span></label><input type="text" id="n-title" required placeholder="Мэдээний гарчиг" /></div>
            <div class="form-row" style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
              <div class="form-group"><label for="n-date">Огноо</label><input type="text" id="n-date" placeholder="2026.06.16" /></div>
              <div class="form-group"><label for="n-category">Ангилал</label>
                <select id="n-category">
                  <option value="chuulgan">Чуулган</option>
                  <option value="uulzalt">Уулзалт</option>
                  <option value="toirog">Тойргийн ажил</option>
                  <option value="tsahim">Цахим хөгжил</option>
                  <option value="hyanalt">Хяналт шалгалт</option>
                  <option value="busad">Бусад</option>
                </select>
              </div>
            </div>
            <div class="form-group"><label for="n-excerpt">Товч агуулга</label><textarea id="n-excerpt" rows="3" placeholder="Мэдээний товч тайлбар…"></textarea></div>
            <div class="form-group"><label for="n-link">Эх сурвалж / дэлгэрэнгүй холбоос (заавал биш)</label><input type="url" id="n-link" placeholder="https://..." /></div>
            <div class="form-group"><label for="n-image">Зураг (заавал биш)</label><input type="file" id="n-image" accept="image/*" /><div id="n-image-cur" class="form-note" style="margin-top:6px"></div></div>
            <div class="form-group"><label style="display:flex;gap:9px;align-items:center;cursor:pointer"><input type="checkbox" id="n-published" checked style="width:18px;height:18px;accent-color:var(--color-accent)" /> Нийтлэх (сайтад харагдана)</label></div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
              <button type="submit" class="btn btn-gold btn-sm">Хадгалах</button>
              <button type="button" id="news-cancel" class="btn btn-ghost btn-sm" style="display:none">Цуцлах</button>
              <span id="news-msg" class="form-note"></span>
            </div>
          </form>
        </div>
        <div id="news-list"></div>
        <div id="news-empty" class="search-empty" style="display:none">Одоогоор мэдээ алга. Дээрх формоор нэмнэ үү.</div>
      </div>
    </div>
  </div>

  <div class="lightbox" id="lightbox"><button aria-label="Хаах">✕</button><img src="" alt="" /></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script>
  (function () {
    const SUBJECT_LABEL = { gerel:"Гэрэлтүүлэг", zam:"Зам, нүх, эвдрэл", yavgan:"Явган хүний зам", hog:"Хог, орчны бохирдол", buudal:"Автобусны буудал", surguuli:"Сургууль, цэцэрлэг", emnelg:"Эмнэлэг, өрхийн эмнэлэг", soh:"СӨХ, байрны орчин", hurteemj:"Ахмад, ХБИ хүртээмж", huuli:"Хууль, бодлогын санал", urgudul:"Хувийн өргөдөл, тусламж", sanal:"Санал", gomdol:"Гомдол", asuudal:"Тулгамдсан асуудал", uulzalt:"Уулзалтын хүсэлт", busad:"Бусад" };
    const STATUS_LABEL = { new:"Шинэ", in_progress:"Шийдвэрлэж буй", done:"Шийдвэрлэсэн" };
    const $ = (s) => document.querySelector(s);
    const loginView = $("#login-view"), dashView = $("#dash-view"), logoutBtn = $("#logout-btn");
    const listEl = $("#fb-list"), emptyEl = $("#fb-empty"), loadingEl = $("#fb-loading");
    let sb = null, allRows = [], currentRows = [];

    function esc(s) { return (s == null ? "" : String(s)).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
    function fmtDate(s) { const d = new Date(s); return d.toLocaleString("mn-MN", { year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" }); }

    async function signedUrl(path) {
      const { data } = await sb.storage.from("feedback-photos").createSignedUrl(path, 3600);
      return data ? data.signedUrl : "";
    }
    // Нийтэд ил саналын зураг public сангаас, бусад нь хаалттай сангаас
    async function photoUrl(path, isPublic) {
      if (isPublic) {
        try { return sb.storage.from("feedback-public").getPublicUrl(path).data.publicUrl; } catch (_) { return ""; }
      }
      return await signedUrl(path);
    }

    function computeStats(rows) {
      $("#st-total").textContent = rows.length;
      $("#st-new").textContent = rows.filter((r) => r.status === "new").length;
      const rated = rows.filter((r) => r.rating != null);
      $("#st-rating").textContent = rated.length ? (rated.reduce((a, r) => a + r.rating, 0) / rated.length).toFixed(1) + "/10" : "—";
      $("#st-photos").textContent = rows.filter((r) => r.photos && r.photos.length).length;
    }

    function applyFilters() {
      const q = $("#f-q").value.trim().toLowerCase();
      const d = $("#f-district").value, st = $("#f-status").value, su = $("#f-subject").value;
      const rows = allRows.filter((r) => {
        if (d !== "all" && r.district !== d) return false;
        if (st !== "all" && r.status !== st) return false;
        if (su !== "all" && r.subject !== su) return false;
        if (q && !((r.name || "") + (r.message || "")).toLowerCase().includes(q)) return false;
        return true;
      });
      currentRows = rows;
      render(rows);
    }

    // ---- Excel (.xlsx) рүү татах (одоо шүүгдсэн саналуудыг) ----
    function exportXLSX() {
      const rows = currentRows.length ? currentRows : allRows;
      if (!rows.length) { alert("Татах санал алга байна."); return; }
      if (typeof XLSX === "undefined") { alert("Excel сан ачаалагдаагүй байна. Интернэт холболтоо шалгаад дахин оролдоно уу."); return; }
      const headers = ["Огноо","Нэр","И-мэйл","Утас","Төрөл","Дүүрэг","Хороо","Агуулга","Оноо / Үнэлгээ (1-10)","Байршил (Google Maps)","Зургийн тоо","Төлөв"];
      const aoa = [headers];
      rows.forEach((r) => {
        aoa.push([
          fmtDate(r.created_at),
          r.name || "",
          r.email || "",
          r.phone || "",
          SUBJECT_LABEL[r.subject] || r.subject || "",
          r.district || "",
          r.khoroo ? r.khoroo + "-р хороо" : "",
          r.message || "",
          r.rating != null ? r.rating : "",
          (r.lat && r.lng) ? `https://www.google.com/maps?q=${r.lat},${r.lng}` : "",
          r.photos ? r.photos.length : 0,
          STATUS_LABEL[r.status] || r.status || "",
        ]);
      });
      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws["!cols"] = [
        { wch: 18 }, { wch: 16 }, { wch: 24 }, { wch: 12 }, { wch: 16 }, { wch: 12 },
        { wch: 12 }, { wch: 44 }, { wch: 12 }, { wch: 40 }, { wch: 11 }, { wch: 16 },
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Санал хүсэлт");
      const now = new Date();
      const stamp = now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-" + String(now.getDate()).padStart(2, "0");
      XLSX.writeFile(wb, `sanal-huselt-${stamp}.xlsx`);
    }

    function render(rows) {
      listEl.innerHTML = "";
      emptyEl.style.display = rows.length ? "none" : "block";
      rows.forEach((r) => {
        const card = document.createElement("div");
        card.className = "fb-card";
        const loc = (r.district ? r.district + " дүүрэг" : "") + (r.khoroo ? ", " + r.khoroo + "-р хороо" : "");
        const mapLink = (r.lat && r.lng) ? `<a href="https://www.google.com/maps?q=${r.lat},${r.lng}" target="_blank" rel="noopener">🗺 Газрын зураг дээр харах</a>` : "";
        const ticket = r.ticket_seq != null ? "AT-" + new Date(r.created_at).getFullYear() + "-" + String(r.ticket_seq).padStart(6, "0") : null;
        card.innerHTML =
          `<div class="fb-head">
             <div>
               <div class="fb-name">${esc(r.name) || "Нэргүй"}</div>
               <div class="fb-meta">${ticket ? `<span style="color:var(--color-accent);font-weight:600">№ ${ticket}</span>` : ""}<span>📅 ${fmtDate(r.created_at)}</span>${loc ? `<span>📍 ${esc(loc)}</span>` : ""}</div>
             </div>
             <div class="fb-badges">
               ${r.is_public ? `<span class="rate-pill" style="background:rgba(63,210,230,.14);color:var(--color-accent)">🌐 Нийтэд ил</span>` : ""}
               <span class="badge-status ${r.status === "done" ? "status-passed" : r.status === "in_progress" ? "status-review" : "status-draft"}">${STATUS_LABEL[r.status] || r.status}</span>
               <span class="tag" style="position:static;background:var(--color-bg-soft);color:var(--color-accent);border:1px solid var(--color-border)">${SUBJECT_LABEL[r.subject] || r.subject || "—"}</span>
               ${r.rating != null ? `<span class="rate-pill">⭐ ${r.rating}/10</span>` : ""}
             </div>
           </div>
           <div class="fb-msg">${esc(r.message)}</div>
           <div class="fb-photos" data-photos></div>
           ${mapLink ? `<div style="margin:10px 0">${mapLink}</div>` : ""}
           <div class="fb-resp" style="margin:12px 0;padding:12px;border:1px dashed var(--color-border);border-radius:var(--radius-sm)">
             <label style="font-size:.78rem;color:var(--color-text-soft);display:block;margin-bottom:5px">Нийтэд харагдах хариу <span style="opacity:.7">(иргэн дугаараараа явц шалгахад харна)</span></label>
             <textarea class="resp-input" data-id="${r.id}" rows="2" placeholder="Жишээ: Таны саналыг холбогдох газарт уламжиллаа. Шийдвэрлэх хугацаа — 14 хоног." style="width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--color-border);background:var(--color-bg-soft);color:var(--color-text);font-family:inherit;font-size:.9rem;resize:vertical">${esc(r.response || "")}</textarea>
             <button class="btn btn-ghost btn-sm resp-btn" data-id="${r.id}" style="margin-top:7px">Хариу хадгалах</button>
             <span class="resp-ok" style="font-size:.8rem;color:#46c882;margin-left:10px;display:none">✓ Хадгаллаа</span>
           </div>
           <div class="fb-foot">
             <div class="fb-contact">
               ${r.email ? `<a href="mailto:${esc(r.email)}">✉ ${esc(r.email)}</a>` : ""}
               ${r.phone ? `<a href="tel:${esc(r.phone)}">☎ ${esc(r.phone)}</a>` : ""}
             </div>
             <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
               <label style="font-size:.82rem;color:var(--color-text-soft)">Төлөв:
                 <select class="status-sel" data-id="${r.id}">
                   <option value="new" ${r.status === "new" ? "selected" : ""}>Шинэ</option>
                   <option value="in_progress" ${r.status === "in_progress" ? "selected" : ""}>Шийдвэрлэж буй</option>
                   <option value="done" ${r.status === "done" ? "selected" : ""}>Шийдвэрлэсэн</option>
                 </select>
               </label>
               <button class="btn btn-ghost btn-sm pub-btn" data-id="${r.id}">${r.is_public ? "🙈 Нийтээс нуух" : "🌐 Нийтэд ил болгох"}</button>
               ${r.is_public ? `<button class="btn btn-ghost btn-sm cmt-btn" data-id="${r.id}">💬 Коммент</button>` : ""}
               <button class="btn btn-ghost btn-sm del-btn" data-id="${r.id}" style="color:var(--color-danger)">🗑 Устгах</button>
             </div>
           </div>
           <div class="fb-comments" data-comments style="display:none;margin-top:12px"></div>`;
        listEl.appendChild(card);

        // Нийтэд ил / нуух toggle
        card.querySelector(".pub-btn").addEventListener("click", async (e) => {
          const btn = e.currentTarget; btn.disabled = true;
          const next = !r.is_public;
          if (next && !confirm("Энэ саналыг нийтэд ил болгох уу? Асуудал, зураг, дүүрэг/хороо, үнэлгээ нь сайтад харагдана (нэр/утас/имэйл/байршил харагдахгүй).")) { btn.disabled = false; return; }
          const { error } = await sb.from("feedback").update({ is_public: next }).eq("id", r.id);
          if (error) { alert("Алдаа: " + error.message); btn.disabled = false; return; }
          r.is_public = next;
          render(currentRows.length ? currentRows : allRows);
        });

        // Коммент модерац
        const cmtBtn = card.querySelector(".cmt-btn");
        if (cmtBtn) {
          cmtBtn.addEventListener("click", async () => {
            const box = card.querySelector("[data-comments]");
            if (box.style.display === "block") { box.style.display = "none"; return; }
            box.style.display = "block";
            box.innerHTML = '<p style="color:var(--color-text-soft);font-size:.85rem">Ачаалж байна…</p>';
            const { data: cm, error } = await sb.from("feedback_comments").select("*").eq("feedback_id", r.id).order("created_at", { ascending: true });
            if (error) { box.innerHTML = '<p style="color:var(--color-danger)">Коммент ачаалахад алдаа.</p>'; return; }
            if (!cm || !cm.length) { box.innerHTML = '<p style="color:var(--color-text-soft);font-size:.85rem">Коммент алга.</p>'; return; }
            box.innerHTML = "";
            cm.forEach((c) => {
              const row = document.createElement("div");
              row.style.cssText = "display:flex;gap:10px;align-items:flex-start;padding:8px 10px;border:1px solid var(--color-border);border-radius:8px;margin-bottom:6px;background:var(--color-bg-soft)";
              row.innerHTML = `<div style="flex:1"><div style="font-size:.74rem;color:var(--color-text-soft)">Зочин · ${fmtDate(c.created_at)}</div><div style="font-size:.9rem">${esc(c.body)}</div></div>`;
              const del = document.createElement("button");
              del.className = "btn btn-ghost btn-sm"; del.style.color = "var(--color-danger)"; del.textContent = "🗑";
              del.addEventListener("click", async () => {
                if (!confirm("Энэ комментыг устгах уу?")) return;
                del.disabled = true;
                const { error: de } = await sb.from("feedback_comments").delete().eq("id", c.id);
                if (de) { alert("Алдаа: " + de.message); del.disabled = false; return; }
                row.remove();
              });
              row.appendChild(del);
              box.appendChild(row);
            });
          });
        }

        // Зургуудыг ачаалах (нийтэд ил бол public, эс бөгөөс signed URL)
        if (r.photos && r.photos.length) {
          const box = card.querySelector("[data-photos]");
          r.photos.forEach(async (p) => {
            const url = await photoUrl(p, r.is_public);
            if (!url) return;
            const img = document.createElement("img");
            img.src = url; img.alt = "Хавсаргасан зураг"; img.loading = "lazy";
            img.addEventListener("click", () => openLightbox(url));
            box.appendChild(img);
          });
        }

        // Устгах
        card.querySelector(".del-btn").addEventListener("click", async (e) => {
          if (!confirm("Энэ саналыг бүрмөсөн устгах уу?")) return;
          const id = e.target.dataset.id;
          e.target.disabled = true;
          // Хавсралт зургуудыг мөн устгах (зөв сангаас)
          if (r.photos && r.photos.length) { try { await sb.storage.from(r.is_public ? "feedback-public" : "feedback-photos").remove(r.photos); } catch (_) {} }
          const { error } = await sb.from("feedback").delete().eq("id", id);
          if (error) { alert("Алдаа: " + error.message); e.target.disabled = false; return; }
          allRows = allRows.filter((x) => x.id !== id);
          computeStats(allRows);
          card.remove();
          if (!allRows.length) emptyEl.style.display = "block";
        });

        // Төлөв шинэчлэх
        card.querySelector(".status-sel").addEventListener("change", async (e) => {
          const id = e.target.dataset.id, val = e.target.value;
          e.target.disabled = true;
          const { error } = await sb.from("feedback").update({ status: val }).eq("id", id);
          e.target.disabled = false;
          if (error) { alert("Алдаа: " + error.message); return; }
          const row = allRows.find((x) => x.id === id); if (row) row.status = val;
          computeStats(allRows);
          const badge = card.querySelector(".badge-status");
          badge.className = "badge-status " + (val === "done" ? "status-passed" : val === "in_progress" ? "status-review" : "status-draft");
          badge.textContent = STATUS_LABEL[val];
        });

        // Нийтэд харагдах хариу хадгалах
        card.querySelector(".resp-btn").addEventListener("click", async (e) => {
          const btn = e.currentTarget, id = btn.dataset.id;
          const ta = card.querySelector(".resp-input");
          const ok = card.querySelector(".resp-ok");
          const val = ta.value.trim() || null;
          btn.disabled = true;
          const { error } = await sb.from("feedback").update({ response: val }).eq("id", id);
          btn.disabled = false;
          if (error) { alert("Алдаа: " + error.message); return; }
          const row = allRows.find((x) => x.id === id); if (row) row.response = val;
          ok.style.display = "inline"; setTimeout(() => { ok.style.display = "none"; }, 2500);
        });
      });
    }

    function openLightbox(url) { const lb = $("#lightbox"); lb.querySelector("img").src = url; lb.classList.add("open"); }
    $("#lightbox").addEventListener("click", (e) => { if (e.target.id === "lightbox" || e.target.tagName === "BUTTON") $("#lightbox").classList.remove("open"); });

    async function loadFeedback() {
      loadingEl.style.display = "block"; listEl.innerHTML = ""; emptyEl.style.display = "none";
      const { data, error } = await sb.from("feedback").select("*").order("created_at", { ascending: false });
      loadingEl.style.display = "none";
      if (error) { emptyEl.textContent = "Ачаалахад алдаа: " + error.message; emptyEl.style.display = "block"; return; }
      allRows = data || [];
      computeStats(allRows);
      applyFilters();
    }

    function showDash() { loginView.style.display = "none"; dashView.style.display = "block"; logoutBtn.style.display = "inline-flex"; loadFeedback(); }
    function showLogin() { loginView.style.display = "grid"; dashView.style.display = "none"; logoutBtn.style.display = "none"; }

    // Эхлүүлэх
    sb = window.getSB && window.getSB();
    if (!sb) { document.body.innerHTML = '<div class="container" style="padding:60px 20px;text-align:center"><h2>Supabase холбогдоогүй байна</h2><p class="form-note">supabase-config.js эсвэл интернэт холболтоо шалгана уу.</p></div>'; return; }

    sb.auth.getSession().then(({ data }) => { if (data.session) showDash(); else showLogin(); });

    $("#login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = $("#login-err"); errEl.textContent = "";
      const { error } = await sb.auth.signInWithPassword({ email: $("#l-email").value.trim(), password: $("#l-pass").value });
      if (error) { errEl.textContent = "⚠ " + (error.message === "Invalid login credentials" ? "И-мэйл эсвэл нууц үг буруу байна." : error.message); return; }
      showDash();
    });

    logoutBtn.addEventListener("click", async () => { await sb.auth.signOut(); showLogin(); });
    $("#refresh-btn").addEventListener("click", loadFeedback);
    $("#export-btn").addEventListener("click", exportXLSX);
    ["#f-q", "#f-district", "#f-status", "#f-subject"].forEach((s) => {
      $(s).addEventListener(s === "#f-q" ? "input" : "change", applyFilters);
    });

    // ===== МЭДЭЭ УДИРДАХ =====
    const NEWS_CAT = { chuulgan:"Чуулган", uulzalt:"Уулзалт", toirog:"Тойргийн ажил", tsahim:"Цахим хөгжил", hyanalt:"Хяналт шалгалт", busad:"Бусад" };
    let newsRows = [], newsLoaded = false;
    const newsForm = $("#news-form"), newsList = $("#news-list"), newsEmpty = $("#news-empty"), newsMsg = $("#news-msg");

    function resetNewsForm() {
      newsForm.reset(); $("#n-id").value = ""; $("#n-published").checked = true;
      $("#news-form-title").textContent = "Шинэ мэдээ нэмэх";
      $("#news-cancel").style.display = "none"; $("#n-image-cur").textContent = "";
    }

    async function loadNews() {
      newsList.innerHTML = ""; newsEmpty.style.display = "none";
      const { data, error } = await sb.from("news").select("*").order("created_at", { ascending: false });
      if (error) { newsEmpty.textContent = "Ачаалахад алдаа: " + error.message + " (supabase-news.sql ажилласан эсэхээ шалгана уу)"; newsEmpty.style.display = "block"; return; }
      newsRows = data || []; renderNews();
    }

    function renderNews() {
      newsList.innerHTML = "";
      newsEmpty.style.display = newsRows.length ? "none" : "block";
      newsRows.forEach((n) => {
        const row = document.createElement("div");
        row.className = "news-row";
        row.innerHTML =
          `${n.image ? `<img src="${esc(n.image)}" alt="" />` : ""}
           <div class="nr-body">
             <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:4px">
               <span class="tag" style="position:static;background:var(--color-bg-soft);color:var(--color-accent);border:1px solid var(--color-border)">${esc(NEWS_CAT[n.category] || n.category || "—")}</span>
               ${n.published ? "" : `<span class="badge-status status-draft">Ноорог</span>`}
               <span style="font-size:.8rem;color:var(--color-text-soft)">${esc(n.date || "")}</span>
             </div>
             <div style="font-weight:600">${esc(n.title)}</div>
             <div style="font-size:.86rem;color:var(--color-text-soft);margin-top:4px">${esc((n.excerpt || "").slice(0, 130))}</div>
           </div>
           <div class="nr-actions">
             <button class="btn btn-ghost btn-sm nr-edit">Засах</button>
             <button class="btn btn-ghost btn-sm nr-del" style="color:var(--color-danger)">Устгах</button>
           </div>`;
        row.querySelector(".nr-edit").addEventListener("click", () => editNews(n));
        row.querySelector(".nr-del").addEventListener("click", () => deleteNews(n));
        newsList.appendChild(row);
      });
    }

    function editNews(n) {
      $("#n-id").value = n.id;
      $("#n-title").value = n.title || "";
      $("#n-date").value = n.date || "";
      $("#n-category").value = n.category || "busad";
      $("#n-excerpt").value = n.excerpt || "";
      $("#n-link").value = n.link || "";
      $("#n-published").checked = !!n.published;
      $("#n-image-cur").textContent = n.image ? "Одоогийн зураг хадгалагдана. Шинээр сонгвол солигдоно." : "";
      $("#news-form-title").textContent = "Мэдээ засах";
      $("#news-cancel").style.display = "inline-flex";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    async function deleteNews(n) {
      if (!confirm("«" + (n.title || "") + "» мэдээг устгах уу?")) return;
      const { error } = await sb.from("news").delete().eq("id", n.id);
      if (error) { alert("Алдаа: " + error.message); return; }
      if (n.image && n.image.includes("/news-photos/")) {
        const p = n.image.split("/news-photos/")[1];
        if (p) { try { await sb.storage.from("news-photos").remove([p]); } catch (_) {} }
      }
      newsRows = newsRows.filter((x) => x.id !== n.id); renderNews();
    }

    newsForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      newsMsg.textContent = ""; newsMsg.style.color = "";
      const btn = newsForm.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = "Хадгалж байна…";
      try {
        const id = $("#n-id").value;
        let imageUrl = null;
        const file = $("#n-image").files[0];
        if (file) {
          const ext = (file.name.split(".").pop() || "jpg").toLowerCase().replace(/[^a-z0-9]/g, "");
          const path = `${Date.now()}-${Math.round(Math.random() * 1e6)}.${ext}`;
          const { error: upErr } = await sb.storage.from("news-photos").upload(path, file, { contentType: file.type });
          if (upErr) throw upErr;
          imageUrl = sb.storage.from("news-photos").getPublicUrl(path).data.publicUrl;
        }
        const rec = {
          title: $("#n-title").value.trim(),
          date: $("#n-date").value.trim() || null,
          category: $("#n-category").value,
          excerpt: $("#n-excerpt").value.trim() || null,
          link: $("#n-link").value.trim() || null,
          published: $("#n-published").checked,
        };
        if (imageUrl) rec.image = imageUrl;
        let error;
        if (id) { ({ error } = await sb.from("news").update(rec).eq("id", id)); }
        else { ({ error } = await sb.from("news").insert(rec)); }
        if (error) throw error;
        newsMsg.style.color = "var(--color-success)";
        newsMsg.textContent = "✓ Хадгаллаа.";
        resetNewsForm(); await loadNews();
        setTimeout(() => { newsMsg.textContent = ""; }, 4000);
      } catch (err) {
        newsMsg.style.color = "var(--color-danger)";
        newsMsg.textContent = "Алдаа: " + (err.message || "хадгалж чадсангүй");
      } finally {
        btn.disabled = false; btn.textContent = "Хадгалах";
      }
    });

    $("#news-cancel").addEventListener("click", resetNewsForm);

    // Таб солих
    document.querySelectorAll(".atab").forEach((t) => {
      t.addEventListener("click", () => {
        document.querySelectorAll(".atab").forEach((x) => x.classList.toggle("active", x === t));
        const v = t.dataset.view;
        $("#fb-view").style.display = v === "fb" ? "block" : "none";
        $("#news-view").style.display = v === "news" ? "block" : "none";
        if (v === "news" && !newsLoaded) { newsLoaded = true; loadNews(); }
      });
    });
  })();
  </script>
</body>
</html>
